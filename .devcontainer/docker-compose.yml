services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/arandu_nexus
    networks:
      - arandu-nexus-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - arandu-nexus-network

volumes:
  mongodb-data:

networks:
  arandu-nexus-network:
